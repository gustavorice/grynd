# Fly.io config — gerado pra Grynd
# Após criar o app: fly launch --no-deploy --copy-config (ou edite app= abaixo)

app = "grynd"
primary_region = "gru" # São Paulo, BR

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

  [[http_service.checks]]
    grace_period = "20s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/api/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb" # Playwright precisa de RAM; 512mb é justo demais
  processes = ["app"]

# Secrets esperados (configurar com `fly secrets set`):
# DATABASE_URL, CLERK_SECRET_KEY, CLERK_PUBLISHABLE_KEY (publica, mas conveniente),
# STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET,
# STRIPE_PRICE_PRO_MONTHLY, STRIPE_PRICE_AGENCY_MONTHLY, STRIPE_PRICE_ADDON_200,
# UPSTASH_REDIS_REST_URL, UPSTASH_REDIS_REST_TOKEN,
# WHATSAPP_PHONE_NUMBER_ID, WHATSAPP_ACCESS_TOKEN (opcional)
